docs_dir: boilerplate_docs

site_name: ~ 𝚋𝚎𝚊𝚖𝚙𝚒𝚙𝚎-𝚌𝚘𝚛𝚎
site_description: Event-driven control plane for scheduler-aware radio astronomy workflows.
site_author: Jack Blackwood
site_url: https://beampipe-core.readthedocs.io/

theme:
  name: material
  custom_dir: boilerplate_docs/overrides
  font: false
  logo: https://github.com/user-attachments/assets/4414e79f-7431-4999-b2ef-28cf9f0b254e
  favicon: https://github.com/user-attachments/assets/4414e79f-7431-4999-b2ef-28cf9f0b254e
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: blue

plugins:
  - search

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - API: api/index.md
  - Project modules:
      - Overview: project-modules/index.md
      - How it works: project-modules/lifecycle.md
      - Authoring a module: project-modules/authoring.md
  - Deployment profiles: deployment-profiles/index.md
  - Tools:
      - Bruno collection: tools/bruno.md
      - OpenAPI export: tools/openapi.md
  - Contributing: contributing.md

exclude_docs: |
  user-guide/**
  community.md
  operations/**
  getting-started/index.md
  getting-started/first-run.md
  deployment-profiles/rest-remote.md
  deployment-profiles/slurm-remote.md
  deployment-profiles/daliuge.md
  project-modules/contract.md
  project-modules/wallaby-hires.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jbwod/beampipe-core

extra_css:
  - stylesheets/extra.css
  - stylesheets/redoc.css

extra_javascript:
  - javascripts/bp-stars.js
  - javascripts/redoc-init.js

repo_name: jbwod/beampipe-core
repo_url: https://github.com/jbwod/beampipe-core
edit_uri: edit/main/boilerplate_docs/
