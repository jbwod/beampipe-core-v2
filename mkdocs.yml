docs_dir: boilerplate_docs

site_name: beampipe operator docs
site_description: Operate and extend Beampipe, the Rust control plane for archive-driven radio astronomy workflows.
site_author: Jack Blackwood
site_url: https://beampipe-core.readthedocs.io/

theme:
  name: material
  custom_dir: boilerplate_docs/overrides
  font: false
  logo: assets/brand/beampipe-terminal-icon.png
  favicon: assets/brand/beampipe-terminal-icon.png
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: blue

plugins:
  - search

nav:
  - Home: index.md
  - Start:
      - Choose a path: getting-started/index.md
      - Five-minute local: getting-started/five-minute-start.md
      - Installation: getting-started/installation.md
      - First workflow: getting-started/first-run.md
      - Application configuration: getting-started/configuration.md
  - Operate:
      - Operator handbook: operations/index.md
      - Daily workflow: operations/operator-guide.md
      - Live console: operations/console.md
      - Workers and scheduling: operations/workers-scheduling.md
      - DALiuGE and Setonix: operations/daliuge-setonix.md
      - Observability: operations/observability.md
      - Recovery and cancellation: operations/recovery.md
      - Production runbook: operations/production-runbook.md
      - Upgrades, backups, and secrets: operations/upgrades-backups.md
  - Configure projects:
      - YAML model: project-configs/index.md
      - Transforms: project-configs/transforms.md
      - DALiuGE graph patches: project-configs/graph-patches.md
      - WASM extensions: project-configs/wasm-hooks.md
  - Understand:
      - Architecture map: architecture/index.md
      - Control-plane boundaries: architecture/control-plane.md
      - Discovery and execution: architecture/lifecycle.md
      - Execution state model: architecture/state-machine.md
      - Integration adapters: architecture/adapters.md
      - Deployment profiles: architecture/deployment-profiles.md
  - Reference:
      - CLI commands: reference/cli.md
      - Glossary: reference/glossary.md
      - API workflow: api/index.md
      - API schema: api/reference.md
      - Bruno collection: tools/bruno.md
      - OpenAPI export: tools/openapi.md
  - Engineering:
      - Contributing: contributing.md
      - Documentation map: about/documentation-map.md
      - Overhaul design record: architecture/operator-overhaul-assessment.md

exclude_docs: |
  overrides/

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jbwod/beampipe-core-v2

extra_css:
  - stylesheets/extra.css
  - stylesheets/redoc.css

extra_javascript:
  - javascripts/terminal-ui.js
  - javascripts/redoc-init.js

repo_name: jbwod/beampipe-core-v2
repo_url: https://github.com/jbwod/beampipe-core-v2
edit_uri: edit/main/boilerplate_docs/
