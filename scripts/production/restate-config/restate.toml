# Restate Server Cluster Configuration
# (see https://docs.restate.dev/server/configuration).
#   https://docs.restate.dev/server/clusters
#   https://docs.restate.dev/guides/local-to-replicated
#   https://docs.restate.dev/server/snapshots
#

cluster-name = "beampipe"

default-replication = 2

# All nodes run every role (default)
# roles = ["worker", "admin", "metadata-server", "log-server", "http-ingress"]

[bifrost]
default-provider = "replicated"

[worker.snapshots]
# Required for multi-node clusters — https://docs.restate.dev/server/snapshots
destination = ""
aws-region = ""
snapshot-interval-num-records = 100000
snapshot-interval = "60m"
