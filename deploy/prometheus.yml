global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: beampipe-api
    honor_labels: true
    static_configs:
      - targets: ['api:9090']
        labels:
          instance: api
          role: api

  - job_name: beampipe-scheduler
    honor_labels: true
    static_configs:
      - targets: ['scheduler:9090']
        labels:
          instance: scheduler
          role: scheduler

  - job_name: beampipe-worker
    honor_labels: true
    dns_sd_configs:
      - names: ['worker']
        type: A
        port: 9090
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: role
        replacement: worker
