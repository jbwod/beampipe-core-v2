x-beampipe-shaping: &beampipe-shaping
  BEAMPIPE_SCHEDULER_INTERVAL_SECONDS: "30"
  BEAMPIPE_SHAPING_DISCOVERY_MAX_IN_FLIGHT_BATCHES: "24"
  BEAMPIPE_SHAPING_DISCOVERY_MAX_BATCHES_PER_TICK: "100"
  BEAMPIPE_SHAPING_EXECUTION_MAX_IN_FLIGHT_RUNS: "10"
  BEAMPIPE_SHAPING_QUEUE_MAX_DEPTH: "5000"
  BEAMPIPE_WORKER_LOCK_SECONDS: "600"

# TAP + optional Slurm SSH (from beampipe-core/.env when present). Export BEAMPIPE_USE_REAL_BACKENDS=true for real discovery/execute.
x-beampipe-backend-env: &beampipe-backend-env
  BEAMPIPE_USE_REAL_BACKENDS: ${BEAMPIPE_USE_REAL_BACKENDS:-false}
  BEAMPIPE_CASDA_TAP_URL: ${BEAMPIPE_CASDA_TAP_URL:-https://casda.csiro.au/casda_vo_tools/tap/sync}
  BEAMPIPE_VIZIER_TAP_URL: ${BEAMPIPE_VIZIER_TAP_URL:-https://tapvizier.cds.unistra.fr/TAPVizieR/tap/sync}
  CASDA_LOGIN_URL: ${CASDA_LOGIN_URL:-https://data.csiro.au/casda_vo_proxy/vo/tap/availability}

x-beampipe-worker-env-file: &beampipe-worker-env-file
  env_file:
    - path: beampipe-core/.env
      required: false

# Slurm SSH for scheduler/worker when BEAMPIPE_USE_REAL_BACKENDS=true (see deploy/ssh/README.md).
x-beampipe-slurm-ssh-mounts: &beampipe-slurm-ssh-mounts
  secrets:
    - slurm_ssh_key
  volumes:
    - type: bind
      source: ${SLURM_SSH_KNOWN_HOSTS_SOURCE:-./deploy/ssh/known_hosts}
      target: /run/slurm-ssh/known_hosts
      read_only: true

x-beampipe-slurm-ssh-env: &beampipe-slurm-ssh-env
  SLURM_SSH_PRIVATE_KEY_PATH: /run/secrets/slurm_ssh_key
  SLURM_SSH_KNOWN_HOSTS: /run/slurm-ssh/known_hosts
  BEAMPIPE_SLURM_SSH_STRICT_KNOWN_HOSTS: "true"

# One image for api / scheduler / worker — build once: docker compose build beampipe
x-beampipe-image: &beampipe-image
  image: beampipe-v2:local
  build:
    context: .
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beampipe
    ports:
      - "5432:5432"
    volumes:
      - beampipe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API only — scale with `docker compose up --scale api=2`
  api:
    <<: *beampipe-image
    # API-only: no embedded job worker (requires image built with CLI `--worker` Set action).
    command: ["serve", "--worker", "false"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/beampipe
      BEAMPIPE_JWT_SECRET: ${BEAMPIPE_JWT_SECRET:-local-dev-jwt-secret-change-me}
      BEAMPIPE_BIND_ADDR: 0.0.0.0:8080
      BEAMPIPE_METRICS_BIND_ADDR: 0.0.0.0:9090
      BEAMPIPE_METRICS_SERVER_ENABLED: "true"
      BEAMPIPE_DB_MAX_CONNECTIONS: "20"
      BEAMPIPE_WORKER_SCHEDULER_ENABLED: "false"
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/api/v2/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  # One scheduler replica — enqueues discovery/execution ticks + runs a few jobs
  scheduler:
    <<: [*beampipe-image, *beampipe-worker-env-file, *beampipe-slurm-ssh-mounts]
    command: ["serve", "--worker", "true"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/beampipe
      BEAMPIPE_JWT_SECRET: ${BEAMPIPE_JWT_SECRET:-local-dev-jwt-secret-change-me}
      BEAMPIPE_BIND_ADDR: 0.0.0.0:8081
      BEAMPIPE_METRICS_BIND_ADDR: 0.0.0.0:9090
      BEAMPIPE_METRICS_SERVER_ENABLED: "true"
      BEAMPIPE_WORKER_CONCURRENCY: "2"
      BEAMPIPE_WORKER_SCHEDULER_ENABLED: "true"
      BEAMPIPE_DB_MAX_CONNECTIONS: "20"
      BEAMPIPE_ENV: ${BEAMPIPE_ENV:-development}
      <<: [*beampipe-shaping, *beampipe-backend-env, *beampipe-slurm-ssh-env]
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy

  # Worker-only replicas — default 8 for 1000-source discovery throughput
  # Override: BEAMPIPE_WORKER_CONCURRENCY=8 docker compose up --scale worker=4
  worker:
    <<: [*beampipe-image, *beampipe-worker-env-file, *beampipe-slurm-ssh-mounts]
    command: ["worker"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/beampipe
      BEAMPIPE_JWT_SECRET: ${BEAMPIPE_JWT_SECRET:-local-dev-jwt-secret-change-me}
      BEAMPIPE_METRICS_BIND_ADDR: 0.0.0.0:9090
      BEAMPIPE_METRICS_SERVER_ENABLED: "true"
      BEAMPIPE_WORKER_CONCURRENCY: ${BEAMPIPE_WORKER_CONCURRENCY:-4}
      BEAMPIPE_WORKER_SCHEDULER_ENABLED: "false"
      BEAMPIPE_DISCOVERY_SOURCE_CONCURRENCY: ${BEAMPIPE_DISCOVERY_SOURCE_CONCURRENCY:-5}
      BEAMPIPE_DB_MAX_CONNECTIONS: "25"
      BEAMPIPE_WORKER_POLL_INTERVAL_MS: "200"
      BEAMPIPE_ENV: ${BEAMPIPE_ENV:-development}
      <<: [*beampipe-shaping, *beampipe-backend-env, *beampipe-slurm-ssh-env]
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.55.1
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9099:9090"
    depends_on:
      - api

  alertmanager:
    profiles: [observability, alerting]
    image: prom/alertmanager:v0.28.0
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9094:9093"
    depends_on:
      - prometheus

secrets:
  slurm_ssh_key:
    file: ${SLURM_SSH_PRIVATE_KEY_FILE:-./deploy/ssh/id_slurm}

volumes:
  beampipe_pgdata:
