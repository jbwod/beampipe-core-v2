info:
  name: Trigger Discovery
  type: http
  seq: 3
  tags:
    - sources

http:
  method: POST
  url: "{{baseUrl}}/api/v1/sources/discover"
  body:
    type: json
    data: |-
      {
        "project_module": "wallaby_hires",
        "source_identifier": "HIPASSJ0157-57"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources/discover"
      method: POST
      body:
        type: json
        data: |-
          {
            "project_module": "",
            "source_identifier": "",
            "source_identifiers": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "project_module": "",
            "marked_count": 0,
            "source_identifiers": []
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources/discover"
      method: POST
      body:
        type: json
        data: |-
          {
            "project_module": "",
            "source_identifier": "",
            "source_identifiers": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
