info:
  name: Register Source
  type: http
  seq: 2
  tags:
    - sources

http:
  method: POST
  url: "{{baseUrl}}/api/v1/sources"
  body:
    type: json
    data: |-
      {
        "project_module": "wallaby_hires",
        "source_identifier": "HIPASSJ1313-15",
        "enabled": true
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources"
      method: POST
      body:
        type: json
        data: |-
          {
            "project_module": "",
            "source_identifier": "",
            "enabled": false
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "uuid": "",
            "project_module": "",
            "source_identifier": "",
            "created_at": "",
            "updated_at": "",
            "enabled": false,
            "last_checked_at": "",
            "last_attempted_at": "",
            "stale_after_hours": "",
            "discovery_signature": "",
            "discovery_claim_expires_at": "",
            "workflow_run_pending": false,
            "workflow_run_pending_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources"
      method: POST
      body:
        type: json
        data: |-
          {
            "project_module": "",
            "source_identifier": "",
            "enabled": false
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Register a new source in the registry.

  Registration is idempotent - if a source with the same project_module
  and source_identifier already exists, returns the existing source.

  Args:
      request: FastAPI request object
      source_data: Source registration data (project_module, source_identifier, enabled)
      current_user: Current authenticated user
      db: Database session

  Returns:
      Source registry entry (existing or newly created)
