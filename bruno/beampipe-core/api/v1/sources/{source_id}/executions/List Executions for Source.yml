info:
  name: List Executions for Source
  type: http
  seq: 1
  tags:
    - sources

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sources/:source_id/executions"
  params:
    - name: source_id
      value: ""
      type: path
    - name: page
      value: "1"
      type: query
    - name: items_per_page
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List batch execution records whose ``sources`` JSON included this registry source
  (same ``project_module`` and ``source_identifier``).

  Returns pagination consistent with ``GET /executions``: ``data`` entries contain
  ``uuid``, ``status``, ``created_at``, ``completed_at``.
