info:
  name: Get Source Metadata
  type: http
  seq: 1
  tags:
    - sources

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sources/:source_id/metadata"
  params:
    - name: source_id
      value: 019e04d1-8d2a-781a-ac9a-5a6a5357eb1d
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id/metadata"
      method: GET
      params:
        - name: source_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id/metadata"
      method: GET
      params:
        - name: source_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Get archive metadata for a source.

  Returns all metadata entries (grouped by SBID) for the specified source.

  Args:
      request: FastAPI request object
      source_id: Source UUID
      db: Database session

  Returns:
      Dictionary containing source information and list of metadata entries

  Raises:
      NotFoundException: If source not found
