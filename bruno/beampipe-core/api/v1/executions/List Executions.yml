info:
  name: List Executions
  type: http
  seq: 1
  tags:
    - executions

http:
  method: GET
  url: "{{baseUrl}}/api/v1/executions?page=1&items_per_page=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: items_per_page
      value: "10"
      type: query
    - name: project_module
      value: ""
      type: query
      disabled: true
    - name: status
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/executions"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: items_per_page
          value: "10"
          type: query
        - name: project_module
          value: ""
          type: query
          disabled: true
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
