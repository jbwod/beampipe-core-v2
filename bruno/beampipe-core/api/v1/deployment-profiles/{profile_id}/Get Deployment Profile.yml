info:
  name: Get Deployment Profile
  type: http
  seq: 1
  tags:
    - deployment-profiles

http:
  method: GET
  url: "{{baseUrl}}/api/v1/deployment-profiles/:profile_id"
  params:
    - name: profile_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
