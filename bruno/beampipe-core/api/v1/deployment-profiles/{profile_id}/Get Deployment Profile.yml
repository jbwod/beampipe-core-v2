    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/deployment-profiles/:profile_id"
      method: GET
      params:
        - name: profile_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "uuid": "",
            "name": "",
            "description": "",
            "project_module": "",
            "is_default": false,
            "translation": {
              "algo": "metis",
              "num_par": 1,
              "num_islands": 0,
              "tm_url": ""
            },
            "deployment": {
              "kind": "rest_remote",
