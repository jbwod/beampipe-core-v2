  type: http
  seq: 2
  tags:
    - deployment-profiles

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/deployment-profiles/:profile_id"
  params:
    - name: profile_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "project_module": "",
        "is_default": false,
        "translation": {
          "algo": "metis"
        },
        "deployment": {
          "kind": "rest_remote",
          "verify_ssl": false
        }
      }
  auth: inherit

settings:
