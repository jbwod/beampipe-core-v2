info:
  name: List Deployment Profiles
  type: http
  seq: 1
  tags:
    - deployment-profiles

http:
  method: GET
  url: "{{baseUrl}}/api/v1/deployment-profiles"
  params:
    - name: page
      value: "1"
      type: query
    - name: items_per_page
      value: "10"
      type: query
    - name: project_module
      value: ""
      type: query
      disabled: true
    - name: global_only
      value: "false"
      type: query
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

